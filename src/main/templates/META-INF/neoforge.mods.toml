modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
displayURL = "https://legacy.curseforge.com/minecraft/mc-mods/modernindustrialization-parallel-control-hatch"
logoFile = "logo.png"
authors = "${mod_authors}"
description = '''${mod_description}'''

[[mixins]]
config = "${mod_id}.mixins.json"

[[dependencies."${mod_id}"]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "BOTH"
[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "modern_industrialization"
mandatory = true
versionRange = "[2.4.0,)"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "jade"
type = "optional"
versionRange = "[15.10.0,)"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "kubejs"
type = "optional"
ordering = "BEFORE"
side = "BOTH"